<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>地平线·开放世界驾驶</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a1a2a; overflow: hidden; font-family: 'Segoe UI', 'PingFang SC', system-ui, sans-serif; touch-action: none; }
    #gameContainer { width: 100vw; height: 100vh; position: relative; cursor: grab; }
    #gameContainer:active { cursor: grabbing; }
    canvas { display: block; }
    #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
    .dashboard { position: absolute; bottom: 30px; left: 30px; background: rgba(10,15,20,0.85); backdrop-filter: blur(20px); border: 2px solid rgba(255,140,0,0.8); border-radius: 25px; padding: 20px; color: #fff; min-width: 260px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
    .speed-digital { font-size: 56px; font-weight: 900; color: #ff8c00; font-family: 'Courier New', monospace; text-shadow: 0 0 20px rgba(255,140,0,0.7); line-height: 1; }
    .gear-box { display: inline-block; background: #1a1a2e; border: 2px solid #ff8c00; border-radius: 12px; padding: 6px 16px; font-size: 28px; font-weight: bold; margin-top: 8px; }
    .gear-reverse { border-color: #ff4444; color: #ff4444; }
    .nitro-container { width: 220px; height: 22px; background: #111; border-radius: 11px; overflow: hidden; margin-top: 10px; border: 1px solid #333; }
    .nitro-fill { height: 100%; background: linear-gradient(90deg, #ff2a00, #ff8800, #ffcc00); transition: width 0.1s; }
    .info-row { display: flex; justify-content: space-between; margin-top: 8px; font-size: 12px; color: #bbb; }
    .mode-indicator { position: absolute; top: 30px; left: 30px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border: 2px solid #00ff88; border-radius: 20px; padding: 10px 18px; color: white; font-size: 16px; font-weight: bold; }
    .controls-hint { position: absolute; bottom: 30px; right: 30px; background: rgba(0,0,0,0.6); color: #ccc; font-size: 11px; padding: 8px 12px; border-radius: 8px; font-family: monospace; line-height: 1.6; pointer-events: none; }
    .minimap { position: absolute; bottom: 30px; right: 30px; width: 180px; height: 180px; background: rgba(0,0,0,0.75); border: 3px solid rgba(255,255,255,0.8); border-radius: 50%; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
    #mobileControls { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); display: none; gap: 15px; z-index: 20; pointer-events: none; }
    .touch-btn { width: 65px; height: 65px; background: rgba(20,20,30,0.6); backdrop-filter: blur(15px); border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; color: white; font-size: 24px; display: flex; align-items: center; justify-content: center; pointer-events: auto; user-select: none; transition: all 0.1s; font-weight: bold; }
    .touch-btn:active { background: rgba(255,140,0,0.7); transform: scale(0.85); border-color: #ff8c00; }
    @media (max-width: 900px) { #mobileControls { display: flex; } .dashboard { bottom: 140px; left: 10px; padding: 12px; min-width: 180px; } .speed-digital { font-size: 38px; } .minimap { bottom: 140px; right: 10px; width: 120px; height: 120px; } .controls-hint { bottom: 140px; font-size: 10px; } }
  </style>
</head>
<body>
  <div id="gameContainer">
    <div id="hud">
      <div class="mode-indicator" id="modeIndicator">🚗 驾驶模式</div>
      <div class="dashboard" id="carDashboard">
        <div><span class="speed-digital" id="speedText">0</span><span class="speed-unit">km/h</span></div>
        <div class="gear-box" id="gearText">N</div>
        <div class="nitro-container"><div class="nitro-fill" id="nitroFill" style="width:100%"></div></div>
        <div class="info-row"><span>RPM: <b id="rpmText" style="color:#ff8c00">0</b></span><span id="driftStatus" style="color:#666">稳定</span></div>
        <div class="info-row"><span>档位: <b id="gearMode" style="color:#fff">D</b></span><span id="altitudeInfo" style="color:#666">高度: 0m</span></div>
      </div>
      <div class="controls-hint">🖱 拖拽旋转 | 🔍 滚轮缩放 | V视角<br>F上车/下车 | R重置</div>
      <div class="minimap"><canvas id="minimapCanvas" width="180" height="180"></canvas></div>
    </div>
    <div id="mobileControls">
      <button class="touch-btn" id="btnLeft">◀</button>
      <button class="touch-btn" id="btnRight">▶</button>
      <button class="touch-btn" id="btnAccel">▲</button>
      <button class="touch-btn" id="btnBrake">⏺</button>
      <button class="touch-btn" id="btnDrift">🔄</button>
      <button class="touch-btn" id="btnNitro" style="background:rgba(255,50,0,0.4)">⚡</button>
    </div>
  </div>

  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.157.0/build/three.module.js" } }
  </script>

  <script type="module">
    import * as THREE from 'three';

    const WORLD = 5000;
    const HALF = WORLD / 2;

    // 简化地形 - 只保留自然丘陵，移除富士山
    function getHeight(x, z) {
      const cx = THREE.MathUtils.clamp(x, -HALF, HALF);
      const cz = THREE.MathUtils.clamp(z, -HALF, HALF);
      let h = 0;
      // 自然丘陵
      h += Math.sin(cx * 0.0012) * Math.cos(cz * 0.0012) * 25;
      h += Math.sin(cx * 0.0035 + 1.5) * Math.cos(cz * 0.0028 + 2.5) * 30;
      h += Math.cos(cx * 0.005) * Math.sin(cz * 0.005) * 18;
      h += Math.exp(-((cx - 1500) ** 2 + (cz - 1000) ** 2) / 300000) * 130;
      h += Math.exp(-((cx + 1300) ** 2 + (cz + 1100) ** 2) / 350000) * 150;
      h += Math.exp(-((cx - 1800) ** 2 + (cz + 700) ** 2) / 250000) * 100;
      h += Math.exp(-((cx + 1000) ** 2 + (cz - 900) ** 2) / 200000) * 110;
      h += Math.exp(-((cx - 2000) ** 2 + (cz - 500) ** 2) / 280000) * 120;
      h += Math.exp(-((cx + 1800) ** 2 + (cz + 300) ** 2) / 220000) * 90;
      // 移除富士山
      return h;
    }

    function getNormal(x, z) {
      const d = 2.0;
      const hl = getHeight(x - d, z), hr = getHeight(x + d, z);
      const hd = getHeight(x, z - d), hu = getHeight(x, z + d);
      return new THREE.Vector3(hl - hr, d * 2, hd - hu).normalize();
    }

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.FogExp2(0xb0d8f0, 0.00001);
    const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 1, 6000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.getElementById('gameContainer').appendChild(renderer.domElement);
    scene.add(new THREE.AmbientLight(0x405070, 0.6));
    const sun = new THREE.DirectionalLight(0xfff5e8, 3.5);
    sun.position.set(1000, 1000, 600); sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048); sun.shadow.camera.near = 1; sun.shadow.camera.far = 6000;
    sun.shadow.camera.left = -2000; sun.shadow.camera.right = 2000;
    sun.shadow.camera.top = 2000; sun.shadow.camera.bottom = -2000;
    sun.shadow.bias = -0.0002; scene.add(sun);
    scene.add(new THREE.HemisphereLight(0x87ceeb, 0x4a7a3a, 0.4));

    // 优化地形渲染 - 更平滑的颜色过渡
    const gs = 140, st = WORLD / gs, vs = [], uv = [], idx = [], cl = [];
    for (let iz = 0; iz <= gs; iz++) {
      for (let ix = 0; ix <= gs; ix++) {
        const x = ix * st - HALF, z = iz * st - HALF, h = getHeight(x, z);
        vs.push(x, h, z); uv.push(ix / gs, iz / gs);
        
        // 基于高度的颜色
        let r, g, b;
        if (h > 100) { 
          r = 0.55; g = 0.48; b = 0.38; // 高地
        } else if (h > 60) { 
          const t = (h - 60) / 40;
          r = 0.35 + t * 0.2; g = 0.42 + t * 0.06; b = 0.2 + t * 0.18; 
        } else if (h > 30) { 
          const t = (h - 30) / 30;
          r = 0.28 + t * 0.07; g = 0.42 + t * 0.0; b = 0.18 + t * 0.02; 
        } else { 
          const t = h / 30;
          r = 0.25 + t * 0.03; g = 0.45 + t * (-0.03); b = 0.2 + t * (-0.02); 
        }
        cl.push(r, g, b);
      }
    }
    for (let iz = 0; iz < gs; iz++) for (let ix = 0; ix < gs; ix++) { 
      const a = iz * (gs + 1) + ix, b = a + 1, c = a + (gs + 1), d = c + 1; 
      idx.push(a, c, b, b, c, d); 
    }
    const tg = new THREE.BufferGeometry();
    tg.setAttribute('position', new THREE.Float32BufferAttribute(vs, 3));
    tg.setAttribute('uv', new THREE.Float32BufferAttribute(uv, 2));
    tg.setAttribute('color', new THREE.Float32BufferAttribute(cl, 3));
    tg.setIndex(idx); tg.computeVertexNormals();
    const tm = new THREE.Mesh(tg, new THREE.MeshStandardMaterial({ 
      vertexColors: true, roughness: 0.8, metalness: 0.05, side: THREE.FrontSide, flatShading: false 
    }));
    tm.receiveShadow = true; scene.add(tm);

    // ==================== 全新道路系统 - 连续平滑曲线 ====================
    const RW = 18;
    const ROAD_ELEVATION = 0.3;
    
    // 定义道路网络 - 使用更平滑的路径
    const roadPaths = [];
    
    // 主干道 - 使用贝塞尔曲线
    function addSmoothPath(x1, z1, x2, z2, isMain = false) {
      roadPaths.push({
        type: 'line',
        x1, z1, x2, z2,
        isMain
      });
    }

    // 创建环形道路路径
    function addCircularPath(centerX, centerZ, radius, segments = 120) {
      const points = [];
      for (let i = 0; i <= segments; i++) {
        const angle = (i / segments) * Math.PI * 2;
        points.push({
          x: centerX + Math.cos(angle) * radius,
          z: centerZ + Math.sin(angle) * radius
        });
      }
      roadPaths.push({
        type: 'circular',
        points,
        isMain: true
      });
    }

    // 创建螺旋路径
    function addSpiralPath(centerX, centerZ, startRadius, endRadius, turns = 4, segments = 400) {
      const points = [];
      for (let i = 0; i <= segments; i++) {
        const t = i / segments;
        const angle = t * Math.PI * 2 * turns - Math.PI / 2;
        const radius = startRadius + t * (endRadius - startRadius);
        points.push({
          x: centerX + Math.cos(angle) * radius,
          z: centerZ + Math.sin(angle) * radius
        });
      }
      roadPaths.push({
        type: 'spiral',
        points,
        isMain: false
      });
    }

    // 主干道网络
    for (let x = -2000; x <= 2000; x += 400) addSmoothPath(x, -2000, x, 2000, true);
    for (let z = -2000; z <= 2000; z += 400) addSmoothPath(-2000, z, 2000, z, true);

    // 对角线道路
    addSmoothPath(-2000, -2000, 2000, 2000, false);
    addSmoothPath(-2000, 2000, 2000, -2000, false);
    addSmoothPath(-1500, -2000, 1500, 2000, false);
    addSmoothPath(1500, -2000, -1500, 2000, false);

    // 环形道路（在世界中心）
    addCircularPath(0, 0, 800, 100);
    addCircularPath(0, 0, 500, 80);
    addCircularPath(0, 0, 1200, 120);

    // 螺旋道路（在小山丘上）
    addSpiralPath(300, -150, 600, 100, 4, 300);

    // 渲染连续平滑道路
    function renderSmoothRoad(pathData) {
      if (pathData.type === 'line') {
        const { x1, z1, x2, z2, isMain } = pathData;
        const dx = x2 - x1;
        const dz = z2 - z1;
        const totalLength = Math.sqrt(dx * dx + dz * dz);
        if (totalLength < 0.1) return;
        
        // 创建连续的道路网格（使用BufferGeometry）
        const segments = Math.max(1, Math.floor(totalLength / 4)); // 更密集的采样
        const vertices = [];
        const indices = [];
        const normals = [];
        const colors = [];
        
        const roadColor = isMain ? new THREE.Color(0x3a3a3a) : new THREE.Color(0x444444);
        
        // 生成连续的道路网格
        for (let i = 0; i <= segments; i++) {
          const t = i / segments;
          const x = x1 + dx * t;
          const z = z1 + dz * t;
          const h = getHeight(x, z) + ROAD_ELEVATION;
          const angle = Math.atan2(dx, dz);
          
          // 左右两个顶点
          const perpX = Math.sin(angle + Math.PI/2) * RW/2;
          const perpZ = Math.cos(angle + Math.PI/2) * RW/2;
          
          vertices.push(
            x + perpX, h, z + perpZ,  // 左
            x - perpX, h, z - perpZ   // 右
          );
          
          // 法线朝上
          normals.push(0, 1, 0, 0, 1, 0);
          
          // 颜色
          colors.push(roadColor.r, roadColor.g, roadColor.b, roadColor.r, roadColor.g, roadColor.b);
        }
        
        // 生成三角形索引
        for (let i = 0; i < segments; i++) {
          const a = i * 2;
          const b = i * 2 + 1;
          const c = (i + 1) * 2;
          const d = (i + 1) * 2 + 1;
          
          indices.push(a, c, b, b, c, d);
        }
        
        const roadGeom = new THREE.BufferGeometry();
        roadGeom.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        roadGeom.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
        roadGeom.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
        roadGeom.setIndex(indices);
        
        const roadMesh = new THREE.Mesh(roadGeom, new THREE.MeshStandardMaterial({ 
          vertexColors: true,
          roughness: 0.45, 
          metalness: 0.4,
          side: THREE.DoubleSide
        }));
        roadMesh.receiveShadow = true;
        scene.add(roadMesh);
        
        // 添加道路标线
        addSmoothRoadLines(x1, z1, x2, z2, segments, dx, dz, totalLength);
        
      } else if (pathData.type === 'circular' || pathData.type === 'spiral') {
        renderCurvedRoad(pathData);
      }
    }

    function addSmoothRoadLines(x1, z1, x2, z2, segments, dx, dz, totalLength) {
      for (let offset of [-RW/2 + 0.6, RW/2 - 0.6]) {
        const lineVertices = [];
        const lineIndices = [];
        
        for (let i = 0; i <= segments; i++) {
          const t = i / segments;
          const x = x1 + dx * t;
          const z = z1 + dz * t;
          const h = getHeight(x, z) + ROAD_ELEVATION + 0.02;
          const angle = Math.atan2(dx, dz);
          
          lineVertices.push(
            x + Math.sin(angle + Math.PI/2) * offset,
            h,
            z + Math.cos(angle + Math.PI/2) * offset
          );
        }
        
        for (let i = 0; i < segments; i++) {
          lineIndices.push(i, i + 1);
        }
        
        const lineGeom = new THREE.BufferGeometry();
        lineGeom.setAttribute('position', new THREE.Float32BufferAttribute(lineVertices, 3));
        lineGeom.setIndex(lineIndices);
        
        const lineMesh = new THREE.Line(lineGeom, new THREE.LineBasicMaterial({ 
          color: offset > 0 ? 0xffffff : 0xffff00,
          linewidth: 1
        }));
        scene.add(lineMesh);
      }
    }

    function renderCurvedRoad(pathData) {
      const points = pathData.points;
      if (points.length < 2) return;
      
      // 为曲线道路创建连续的网格
      const allVertices = [];
      const allIndices = [];
      const allNormals = [];
      
      for (let i = 0; i < points.length - 1; i++) {
        const p1 = points[i];
        const p2 = points[i + 1];
        
        const dx = p2.x - p1.x;
        const dz = p2.z - p1.z;
        const segLength = Math.sqrt(dx * dx + dz * dz);
        const subSegments = Math.max(1, Math.floor(segLength / 3));
        
        for (let j = 0; j <= subSegments; j++) {
          const t = j / subSegments;
          const x = p1.x + dx * t;
          const z = p1.z + dz * t;
          const h = getHeight(x, z) + ROAD_ELEVATION;
          const angle = Math.atan2(dx, dz);
          
          const perpX = Math.sin(angle + Math.PI/2) * RW/2;
          const perpZ = Math.cos(angle + Math.PI/2) * RW/2;
          
          allVertices.push(
            x + perpX, h, z + perpZ,  // 左
            x - perpX, h, z - perpZ   // 右
          );
          allNormals.push(0, 1, 0, 0, 1, 0);
          
          // 生成三角形
          const vertexIndex = allVertices.length / 3 - 2;
          if (j > 0) {
            allIndices.push(
              vertexIndex - 2, vertexIndex, vertexIndex - 1,
              vertexIndex - 1, vertexIndex, vertexIndex + 1
            );
          }
        }
      }
      
      const roadGeom = new THREE.BufferGeometry();
      roadGeom.setAttribute('position', new THREE.Float32BufferAttribute(allVertices, 3));
      roadGeom.setAttribute('normal', new THREE.Float32BufferAttribute(allNormals, 3));
      roadGeom.setIndex(allIndices);
      
      const roadMesh = new THREE.Mesh(roadGeom, new THREE.MeshStandardMaterial({ 
        color: 0x4a4a4a,
        roughness: 0.5, 
        metalness: 0.35,
        side: THREE.DoubleSide
      }));
      roadMesh.receiveShadow = true;
      scene.add(roadMesh);
    }

    // 渲染所有道路
    roadPaths.forEach(path => renderSmoothRoad(path));

    // ==================== 碰撞检测 ====================
    function isOnRoad(x, z) {
      for (const path of roadPaths) {
        if (path.type === 'line') {
          const dx = path.x2 - path.x1, dz = path.z2 - path.z1, len = Math.sqrt(dx * dx + dz * dz);
          if (!len) continue;
          const u = ((x - path.x1) * dx + (z - path.z1) * dz) / (len * len);
          if (u >= -0.1 && u <= 1.1 && Math.hypot(x - (path.x1 + u * dx), z - (path.z1 + u * dz)) < RW + 6) return true;
        } else {
          for (let i = 0; i < path.points.length - 1; i++) {
            const p1 = path.points[i], p2 = path.points[i + 1];
            const dx = p2.x - p1.x, dz = p2.z - p1.z, len = Math.sqrt(dx * dx + dz * dz);
            if (!len) continue;
            const u = ((x - p1.x) * dx + (z - p1.z) * dz) / (len * len);
            if (u >= -0.1 && u <= 1.1 && Math.hypot(x - (p1.x + u * dx), z - (p1.z + u * dz)) < RW + 6) return true;
          }
        }
      }
      return false;
    }

    // 湖泊
    const lakes = [
      { x: 1500, z: -1100, rx: 200, rz: 150 }, { x: 1700, z: -850, rx: 120, rz: 170 },
      { x: -1100, z: 750, rx: 180, rz: 120 }, { x: 1800, z: 500, rx: 140, rz: 100 },
      { x: -1600, z: -600, rx: 160, rz: 130 }, { x: 800, z: 1400, rx: 150, rz: 110 }
    ];
    function isInLake(x, z) { return lakes.some(l => { const dx = (x - l.x) / l.rx, dz = (z - l.z) / l.rz; return dx * dx + dz * dz < 1; }); }
    lakes.forEach(l => {
      const lk = new THREE.Mesh(new THREE.CircleGeometry(Math.max(l.rx, l.rz), 32), new THREE.MeshStandardMaterial({ color: 0x2980b9, roughness: 0.15, metalness: 0.5, transparent: true, opacity: 0.8 }));
      lk.rotation.x = -Math.PI / 2; lk.position.set(l.x, 0.35, l.z); lk.scale.set(l.rx / Math.max(l.rx, l.rz), 1, l.rz / Math.max(l.rx, l.rz)); scene.add(lk);
    });

    // 建筑
    const bd = [];
    for (let i = 0; i < 100; i++) {
      let bx, bz, at = 0;
      do { bx = (Math.random() - 0.5) * WORLD * 0.85; bz = (Math.random() - 0.5) * WORLD * 0.85; at++; } while ((isOnRoad(bx, bz) || isInLake(bx, bz)) && at < 100);
      if (at >= 100) continue;
      const w = 5 + Math.random() * 24, h = 10 + Math.random() * 60, d = 5 + Math.random() * 24, th = getHeight(bx, bz);
      const bm = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(0.05 + Math.random() * 0.08, 0.3, 0.4 + Math.random() * 0.4), roughness: 0.4 }));
      bm.position.set(bx, th + h / 2, bz); bm.castShadow = true; bm.receiveShadow = true; scene.add(bm);
      bd.push({ x: bx, z: bz, w: w * 0.85, h, d: d * 0.85 });
    }

    // 树木
    const td = [];
    for (let i = 0; i < 600; i++) {
      let tx, tz, at = 0;
      do { tx = (Math.random() - 0.5) * WORLD * 0.85; tz = (Math.random() - 0.5) * WORLD * 0.85; at++; } while ((isOnRoad(tx, tz) || isInLake(tx, tz)) && at < 100);
      if (at >= 100) continue;
      const th = getHeight(tx, tz);
      const g = new THREE.Group(), h = 3 + Math.random() * 5;
      g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.4, h * 0.5), new THREE.MeshStandardMaterial({ color: 0x6b4c3b, roughness: 0.9 })).translateY(h * 0.25));
      const fl = new THREE.Mesh(new THREE.ConeGeometry(2, h * 0.5, 8), new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(0.2 + Math.random() * 0.1, 0.7, 0.2 + Math.random() * 0.15), roughness: 0.8 }));
      fl.position.y = h * 0.5; fl.castShadow = true; g.add(fl); g.position.set(tx, th, tz); scene.add(g);
      td.push({ x: tx, z: tz, radius: 2 });
    }

    // 车辆
    const carGroup = new THREE.Group();
    carGroup.add(new THREE.Mesh(new THREE.BoxGeometry(2.3, 0.7, 4.4), new THREE.MeshStandardMaterial({ color: 0xe63946, metalness: 0.6, roughness: 0.2 })).translateY(0.75));
    carGroup.add(new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.5, 1.9), new THREE.MeshStandardMaterial({ color: 0x1a1a2e })).translateY(1.3).translateZ(-0.3));
    const wheels = [], wGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.35, 16), wMat = new THREE.MeshStandardMaterial({ color: 0x111, roughness: 0.7 });
    [[-1.3, 0.45, 1.35], [1.3, 0.45, 1.35], [-1.3, 0.45, -1.35], [1.3, 0.45, -1.35]].forEach(([x, y, z]) => { const wh = new THREE.Mesh(wGeo, wMat); wh.position.set(x, y, z); wh.rotation.z = Math.PI / 2; wh.castShadow = true; carGroup.add(wh); wheels.push(wh); });
    const startX = 0, startZ = 200, startH = getHeight(startX, startZ);
    carGroup.position.set(startX, startH + 2, startZ); carGroup.rotation.y = 0; carGroup.castShadow = true; scene.add(carGroup);

    // 人物
    const playerMesh = new THREE.Group();
    playerMesh.add(new THREE.Mesh(new THREE.CapsuleGeometry(0.35, 1.2, 4, 8), new THREE.MeshStandardMaterial({ color: 0x4488ff })).translateY(0.8));
    playerMesh.add(new THREE.Mesh(new THREE.SphereGeometry(0.4, 8, 8), new THREE.MeshStandardMaterial({ color: 0xffccaa })).translateY(1.7));
    playerMesh.position.set(startX + 5, startH + 1.5, startZ); playerMesh.visible = false; scene.add(playerMesh);

    let mode = 'car';
    const startAngle = 0;
    const car = { speed: 0, vel: { x: 0, z: 0 }, maxSpeed: 90, maxReverseSpeed: 20, angle: startAngle, nitro: 100, nitroOn: false, gear: 0, rpm: 0, steerAng: 0, driftAng: 0, drifting: false, wheelRot: 0, isReversing: false };
    const person = { speed: 6, angle: startAngle };
    const keys = {}, touch = { left: false, right: false, accel: false, brake: false, drift: false, nitro: false };

    window.addEventListener('keydown', e => { keys[e.key] = true; if ([' ', 'Shift'].includes(e.key)) e.preventDefault(); });
    window.addEventListener('keyup', e => { keys[e.key] = false; });
    ['btnLeft', 'btnRight', 'btnAccel', 'btnBrake', 'btnDrift', 'btnNitro'].forEach(id => { const btn = document.getElementById(id), prop = id.replace('btn', '').toLowerCase(); if (!btn) return; btn.addEventListener('touchstart', e => { e.preventDefault(); touch[prop] = true; }); btn.addEventListener('touchend', e => { e.preventDefault(); touch[prop] = false; }); btn.addEventListener('mousedown', e => { e.preventDefault(); touch[prop] = true; }); btn.addEventListener('mouseup', e => { e.preventDefault(); touch[prop] = false; }); });

    function resolveCollisions(x, z, r) {
      let rx = x, rz = z;
      for (const b of bd) { const dx = Math.abs(rx - b.x), dz = Math.abs(rz - b.z), ox = b.w / 2 + r - dx, oz = b.d / 2 + r - dz; if (ox > 0 && oz > 0) { if (ox < oz) rx += Math.sign(rx - b.x) * ox; else rz += Math.sign(rz - b.z) * oz; } }
      for (const t of td) { const dx = rx - t.x, dz = rz - t.z, dist = Math.sqrt(dx * dx + dz * dz), md = t.radius + r; if (dist < md && dist > 0.001) { const n = 1 / dist; rx = t.x + dx * n * md; rz = t.z + dz * n * md; } }
      return { x: rx, z: rz };
    }

    window.addEventListener('keydown', e => {
      if (e.key === 'f' || e.key === 'F') {
        if (mode === 'car') { mode = 'person'; person.angle = car.angle; const ox = carGroup.position.x + Math.sin(car.angle) * 3, oz = carGroup.position.z + Math.cos(car.angle) * 3; playerMesh.position.set(ox, getHeight(ox, oz) + 1.5, oz); playerMesh.visible = true; document.getElementById('modeIndicator').textContent = '🚶 步行模式'; }
        else if (mode === 'person') { const dist = new THREE.Vector3(playerMesh.position.x, 0, playerMesh.position.z).distanceTo(new THREE.Vector3(carGroup.position.x, 0, carGroup.position.z)); if (dist < 8) { mode = 'car'; car.speed = 0; car.isReversing = false; playerMesh.visible = false; document.getElementById('modeIndicator').textContent = '🚗 驾驶模式'; } }
      }
      if (e.key === 'r' || e.key === 'R') { const h = getHeight(startX, startZ); carGroup.position.set(startX, h + 2, startZ); car.speed = 0; car.angle = startAngle; car.isReversing = false; playerMesh.position.set(startX + 5, h + 1.5, startZ); }
    });

    let isDragging = false, prevMouse = { x: 0, y: 0 }, cameraYaw = Math.PI, cameraPitch = 0.5, cameraDistance = 30;
    const container = document.getElementById('gameContainer');
    container.addEventListener('mousedown', e => { if (e.button === 0) { isDragging = true; prevMouse.x = e.clientX; prevMouse.y = e.clientY; } });
    window.addEventListener('mousemove', e => { if (!isDragging) return; cameraYaw -= (e.clientX - prevMouse.x) * 0.005; cameraPitch -= (e.clientY - prevMouse.y) * 0.005; cameraPitch = THREE.MathUtils.clamp(cameraPitch, -1.2, 1.2); prevMouse.x = e.clientX; prevMouse.y = e.clientY; });
    window.addEventListener('mouseup', () => { isDragging = false; });
    container.addEventListener('wheel', e => { e.preventDefault(); cameraDistance += e.deltaY * 0.05; cameraDistance = THREE.MathUtils.clamp(cameraDistance, 5, 150); }, { passive: false });
    let touchStartDist = 0;
    container.addEventListener('touchstart', e => { if (e.touches.length === 1) { isDragging = true; prevMouse.x = e.touches[0].clientX; prevMouse.y = e.touches[0].clientY; } else if (e.touches.length === 2) { isDragging = false; touchStartDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); } });
    container.addEventListener('touchmove', e => { if (e.touches.length === 1 && isDragging) { cameraYaw -= (e.touches[0].clientX - prevMouse.x) * 0.005; cameraPitch -= (e.touches[0].clientY - prevMouse.y) * 0.005; cameraPitch = THREE.MathUtils.clamp(cameraPitch, -1.2, 1.2); prevMouse.x = e.touches[0].clientX; prevMouse.y = e.touches[0].clientY; } else if (e.touches.length === 2) { const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); cameraDistance -= (dist - touchStartDist) * 0.05; cameraDistance = THREE.MathUtils.clamp(cameraDistance, 5, 150); touchStartDist = dist; } });
    container.addEventListener('touchend', () => { isDragging = false; });
    let viewMode = 'free';
    window.addEventListener('keydown', e => { if (e.key === 'v' || e.key === 'V') { viewMode = viewMode === 'follow' ? 'free' : 'follow'; if (viewMode === 'follow') { cameraYaw = (mode === 'car' ? car.angle : person.angle) + Math.PI; cameraPitch = 0.5; cameraDistance = 30; } } });

    function updatePhysics(dt) {
      if (mode === 'car') {
        const accel = keys['w'] || keys['ArrowUp'] || touch.accel, brake = keys['s'] || keys['ArrowDown'] || touch.brake, left = keys['a'] || keys['ArrowLeft'] || touch.left, right = keys['d'] || keys['ArrowRight'] || touch.right, drift = keys[' '] || touch.drift, nitro = keys['Shift'] || touch.nitro;
        if (nitro && car.nitro > 8 && !car.nitroOn && car.speed > 3 && !car.isReversing) car.nitroOn = true;
        if (car.nitroOn && car.nitro <= 0) car.nitroOn = false; if (!nitro || car.isReversing) car.nitroOn = false;
        if (brake && car.speed <= 0.5 && !accel) car.isReversing = true; else if (accel || car.speed > 1) car.isReversing = false;
        let force = 0;
        if (car.isReversing) { if (brake) force = -3000; else if (accel) force = 2000; else force = 300; }
        else { if (accel) force = 5500; else if (brake && car.speed > 0.5) force = -3500; else if (brake && car.speed <= 0.5) force = -2000; else force = -400; }
        if (car.nitroOn && !car.isReversing) { force += 4500; car.nitro -= 35 * dt; } else car.nitro = Math.min(100, car.nitro + 20 * dt);
        const n = getNormal(carGroup.position.x, carGroup.position.z), sa = Math.acos(Math.min(1, n.y)), sf = Math.sin(car.angle) * n.x + Math.cos(car.angle) * n.z, ge = -sf * Math.sin(sa) * 400;
        car.speed += ((force + ge - 0.18 * car.speed * Math.abs(car.speed) - 15 * car.speed * (car.drifting ? 2.8 : 1)) / 850) * dt;
        car.speed = THREE.MathUtils.clamp(car.speed, car.isReversing ? -car.maxReverseSpeed : 0, car.isReversing ? 0 : car.maxSpeed + (car.nitroOn ? 20 : 0));
        if (left) car.steerAng = Math.min(0.5, car.steerAng + 6 * dt); else if (right) car.steerAng = Math.max(-0.5, car.steerAng - 6 * dt); else car.steerAng *= Math.exp(-10 * dt);
        car.drifting = drift && Math.abs(car.speed) > 8 && !car.isReversing;
        if (car.drifting) { car.driftAng += car.steerAng * 3.5 * dt; car.driftAng = THREE.MathUtils.clamp(car.driftAng, -0.9, 0.9); } else car.driftAng *= Math.exp(-6 * dt);
        if (Math.abs(car.speed) > 0.5) car.angle += ((car.speed / 6.5) * Math.tan(car.steerAng * Math.max(0.05, 1 - Math.abs(car.speed) / car.maxSpeed * 0.95)) + car.driftAng * 2.5) * dt;
        const ma = car.angle + car.driftAng * 0.5; car.vel.x = Math.sin(ma) * car.speed; car.vel.z = Math.cos(ma) * car.speed;
        carGroup.position.x += car.vel.x * dt; carGroup.position.z += car.vel.z * dt;
        const col = resolveCollisions(carGroup.position.x, carGroup.position.z, 2.5);
        if (col.x !== carGroup.position.x || col.z !== carGroup.position.z) { carGroup.position.x = col.x; carGroup.position.z = col.z; car.speed *= 0.4; }
        carGroup.position.x = THREE.MathUtils.clamp(carGroup.position.x, -HALF + 10, HALF - 10); carGroup.position.z = THREE.MathUtils.clamp(carGroup.position.z, -HALF + 10, HALF - 10);
        carGroup.position.y += (getHeight(carGroup.position.x, carGroup.position.z) - carGroup.position.y) * 0.5;
        const tn = getNormal(carGroup.position.x, carGroup.position.z);
        carGroup.rotation.set(Math.asin(THREE.MathUtils.clamp(Math.cos(car.angle) * tn.x + Math.sin(car.angle) * tn.z, -0.8, 0.8)), car.angle, Math.asin(THREE.MathUtils.clamp(-Math.sin(car.angle) * tn.x + Math.cos(car.angle) * tn.z, -0.5, 0.5)));
        const as = Math.abs(car.speed); car.gear = as < 1.5 ? 0 : as < 12 ? 1 : as < 23 ? 2 : as < 35 ? 3 : as < 48 ? 4 : as < 62 ? 5 : 6;
        car.rpm = as / car.maxSpeed; car.wheelRot += car.speed * dt * 5; wheels.forEach(w => { w.rotation.x += car.wheelRot * dt * 5; });
      } else {
        const fwd = keys['w'] || keys['ArrowUp'] || touch.accel, back = keys['s'] || keys['ArrowDown'] || touch.brake, left = keys['a'] || keys['ArrowLeft'] || touch.left, right = keys['d'] || keys['ArrowRight'] || touch.right;
        if (left) person.angle -= 2.5 * dt; if (right) person.angle += 2.5 * dt;
        let spd = 0; if (fwd) spd = person.speed; if (back) spd = -person.speed * 0.5;
        playerMesh.position.x += Math.sin(person.angle) * spd * dt; playerMesh.position.z += Math.cos(person.angle) * spd * dt;
        playerMesh.position.x = THREE.MathUtils.clamp(playerMesh.position.x, -HALF + 5, HALF - 5); playerMesh.position.z = THREE.MathUtils.clamp(playerMesh.position.z, -HALF + 5, HALF - 5);
        const col = resolveCollisions(playerMesh.position.x, playerMesh.position.z, 0.5);
        if (col.x !== playerMesh.position.x || col.z !== playerMesh.position.z) { playerMesh.position.x = col.x; playerMesh.position.z = col.z; }
        playerMesh.position.y += (getHeight(playerMesh.position.x, playerMesh.position.z) + 1.5 - playerMesh.position.y) * 0.4; playerMesh.rotation.y = person.angle;
      }
    }

    function updateCam() {
      const target = mode === 'car' ? carGroup.position : playerMesh.position, targetAngle = mode === 'car' ? car.angle : person.angle;
      if (viewMode === 'follow') cameraYaw += (targetAngle + Math.PI - cameraYaw) * 0.05;
      const cx = target.x + Math.sin(cameraYaw) * Math.cos(cameraPitch) * cameraDistance, cy = target.y + Math.sin(cameraPitch) * cameraDistance, cz = target.z + Math.cos(cameraYaw) * Math.cos(cameraPitch) * cameraDistance;
      camera.position.lerp(new THREE.Vector3(cx, cy, cz), 0.08); camera.lookAt(target.x, target.y + 1.5, target.z);
    }

    function updateHUD() {
      const spd = mode === 'car' ? Math.abs(car.speed) * 3.6 : Math.hypot((keys['w'] || keys['ArrowUp'] ? person.speed : 0) - (keys['s'] || keys['ArrowDown'] ? person.speed * 0.5 : 0), 0) * 3.6;
      const alt = mode === 'car' ? carGroup.position.y : playerMesh.position.y;
      document.getElementById('speedText').textContent = Math.floor(spd); document.getElementById('altitudeInfo').textContent = '高度: ' + alt.toFixed(1) + 'm';
      if (mode === 'car') {
        const ge = document.getElementById('gearText');
        if (car.isReversing) { ge.textContent = 'R'; ge.className = 'gear-box gear-reverse'; } else { ge.textContent = car.gear === 0 ? 'N' : car.gear; ge.className = 'gear-box'; }
        document.getElementById('nitroFill').style.width = car.nitro + '%'; document.getElementById('rpmText').textContent = Math.floor(car.rpm * 8500);
        document.getElementById('driftStatus').textContent = car.drifting ? '🔥 漂移' : '稳定'; document.getElementById('driftStatus').style.color = car.drifting ? '#ff4400' : '#888';
        document.getElementById('gearMode').textContent = car.isReversing ? 'R' : 'D'; document.getElementById('gearMode').style.color = car.isReversing ? '#ff4444' : '#fff';
      } else {
        document.getElementById('gearText').textContent = '🚶'; document.getElementById('gearText').className = 'gear-box';
        document.getElementById('nitroFill').style.width = '0%'; document.getElementById('rpmText').textContent = '0';
        document.getElementById('driftStatus').textContent = '步行'; document.getElementById('driftStatus').style.color = '#888';
        document.getElementById('gearMode').textContent = '🚶'; document.getElementById('gearMode').style.color = '#fff';
      }
      const mc = document.getElementById('minimapCanvas'), ctx = mc.getContext('2d');
      ctx.clearRect(0, 0, 180, 180); ctx.fillStyle = '#1a2e1a'; ctx.fillRect(0, 0, 180, 180);
      ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
      // 简化小地图渲染
      const sc = 0.015, ox = 90, oy = 90;
      roadPaths.filter(p => p.type === 'line').forEach(r => { 
        ctx.beginPath(); ctx.moveTo(r.x1 * sc + ox, r.z1 * sc + oy); ctx.lineTo(r.x2 * sc + ox, r.z2 * sc + oy); ctx.stroke(); 
      });
      const p = mode === 'car' ? carGroup.position : playerMesh.position;
      ctx.fillStyle = mode === 'car' ? '#00ffff' : '#ffcc00'; ctx.beginPath(); ctx.arc(p.x * sc + ox, p.z * sc + oy, 4, 0, Math.PI * 2); ctx.fill();
    }

    let lt = performance.now();
    function loop(now) { const dt = Math.min((now - lt) / 1000, 0.05); lt = now; updatePhysics(dt); updateCam(); updateHUD(); renderer.render(scene, camera); requestAnimationFrame(loop); }
    window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    requestAnimationFrame(loop);
    console.log('🌍 开放世界驾驶模拟器 | 🛣️ 连续平滑道路系统');
  </script>
